  /api/notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: 一括既読
      description: 自分宛ての未読通知をすべて既読にする
      operationId: markAllNotificationsAsRead
      responses:
        "200":
          description: 一括既読成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - count
                    properties:
                      count:
                        type: integer
                        description: 既読にした通知の件数
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

