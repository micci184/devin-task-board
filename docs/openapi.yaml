  # ────────────────────────────────────────
  # Attachments
  # ────────────────────────────────────────
  /api/tasks/{taskId}/attachments:
    post:
      tags:
        - Attachments
      summary: ファイルアップロード
      description: |
        タスクにファイルを添付する。
        - 対応形式: image/jpeg, image/png, image/gif, image/webp, application/pdf, text/plain, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - ファイルサイズ上限: 10MB (10,485,760 バイト)
      operationId: uploadAttachment
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: アップロードするファイル（上限 10MB）
      responses:
        "201":
          description: ファイルアップロード成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: "#/components/schemas/Attachment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/attachments/{attachmentId}:
    delete:
      tags:
        - Attachments
      summary: ファイル削除
      description: 添付ファイルを削除する
      operationId: deleteAttachment
      parameters:
        - $ref: "#/components/parameters/AttachmentId"
      responses:
        "204":
          description: ファイル削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ────────────────────────────────────────
  # Search
  # ────────────────────────────────────────
  /api/search:
    get:
      tags:
        - Search
      summary: グローバル検索
      description: タスクタイトル、説明、番号、コメントを横断検索する。フィルター対応
      operationId: search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: 検索クエリ
        - name: status
          in: query
          schema:
            type: string
            enum:
              - BACKLOG
              - TODO
              - IN_PROGRESS
              - IN_REVIEW
              - DONE
          description: ステータスでフィルター
        - name: priority
          in: query
          schema:
            type: string
            enum:
              - URGENT
              - HIGH
              - MEDIUM
              - LOW
              - NONE
          description: 優先度でフィルター
        - name: assigneeId
          in: query
          schema:
            type: string
          description: 担当者でフィルター
        - name: categoryId
          in: query
          schema:
            type: string
          description: カテゴリでフィルター
        - name: dueDateFrom
          in: query
          schema:
            type: string
            format: date
          description: 期限範囲（開始）
        - name: dueDateTo
          in: query
          schema:
            type: string
            format: date
          description: 期限範囲（終了）
      responses:
        "200":
          description: 検索成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: "#/components/schemas/SearchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

