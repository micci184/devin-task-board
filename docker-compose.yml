services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devin-task-board-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/devin_task_board?schema=public}
      NODE_ENV: development
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev -- --hostname 0.0.0.0"

  db:
    image: postgres:16
    container_name: devin-task-board-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devin_task_board}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devin_task_board"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  app_node_modules:
